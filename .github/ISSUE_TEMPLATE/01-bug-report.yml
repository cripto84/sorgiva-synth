name: Bug report
description: Report a reproducible problem in Sorgiva Synth
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing Sorgiva Synth. Please provide enough detail to reproduce the issue.
        For security vulnerabilities, stop here and follow SECURITY.md instead of opening a public issue.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-report checks
      options:
        - label: I am using the latest available repository build.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
        - label: This report does not contain a security vulnerability or private information.
          required: true
        - label: I tried Panic / All Notes Off and reloaded the page when appropriate.
          required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Audio unlock or startup
        - Oscillators, Noise, Unison or modulation
        - Filters, envelopes or EQ
        - Effects or Dynamics Safety
        - Step Sequencer
        - Arpeggiator
        - Factory presets
        - User Preset Bank or localStorage
        - Import or export
        - A/B Compare, Randomizer or Morph
        - Virtual or computer keyboard
        - MIDI input
        - MIDI Learn
        - MIDI Clock
        - Scope or Spectrum
        - UI, accessibility or keyboard navigation
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sorgiva Synth version
      placeholder: "Example: v0.26.7r2"
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: "Example: Windows 11 24H2, macOS 15.5, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and exact version
      placeholder: "Example: Chrome 150.0.0.0"
    validations:
      required: true

  - type: dropdown
    id: launch-method
    attributes:
      label: Launch method
      options:
        - file:///
        - localhost
        - HTTPS
        - Other or unknown
    validations:
      required: true

  - type: input
    id: audio-device
    attributes:
      label: Audio output or interface
      placeholder: "Example: built-in audio, Focusrite Scarlett 2i2"
    validations:
      required: false

  - type: input
    id: midi-device
    attributes:
      label: MIDI device, if relevant
      placeholder: "Model and USB/Bluetooth/MIDI-interface connection"
    validations:
      required: false

  - type: textarea
    id: starting-state
    attributes:
      label: Starting patch and state
      description: Include factory preset name or Default Init, Mono/Poly, Unison, Sequencer/Arp and relevant effects.
      placeholder: "Example: Default Init, Poly, Unison off, Sequencer and Arp off"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Press...
        3. Change...
        4. Play...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe sound, UI state, error messages and whether Panic stops the issue.
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - Every time
        - Often
        - Sometimes
        - Once
        - Unable to reproduce again
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Blocker — cannot start or use the synth
        - High — data loss, dangerous level, crash or major function unavailable
        - Medium — important function is wrong but a workaround exists
        - Low — minor defect or visual/documentation issue
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console output
      description: Open browser developer tools and paste relevant errors. Remove private data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recording or exported test file
      description: Drag files into this field when useful. Do not upload sensitive data.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
