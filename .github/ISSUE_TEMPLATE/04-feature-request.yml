name: Feature request
description: Propose a focused improvement that fits Sorgiva Synth's identity
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Sorgiva Synth prioritizes stability, musical usefulness, clarity, accessibility and a lightweight desktop/core design. Large new modules are unlikely before the public-alpha baseline is stable.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-proposal checks
      options:
        - label: I searched existing issues and the public roadmap.
          required: true
        - label: This request is not a bug or support question.
          required: true
        - label: I understand that Sorgiva Synth is not intended to become a DAW.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or musical need
      description: Describe the real workflow problem before describing a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain how the feature would work from a user's perspective.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Main area
      options:
        - Audio engine
        - Oscillators or modulation
        - Filters or envelopes
        - Effects
        - Sequencer
        - Arpeggiator
        - Presets and patch management
        - MIDI or MIDI Learn
        - Performance controls
        - UI or accessibility
        - Documentation or pedagogy
        - Testing or performance
        - Repository and contribution workflow
        - Other
    validations:
      required: true

  - type: textarea
    id: fit
    attributes:
      label: Why it fits Sorgiva Synth
      description: Explain how it improves stability, musicality, clarity, accessibility, learning or usefulness.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include existing controls or workflows that partially solve the problem.
    validations:
      required: true

  - type: checkboxes
    id: impact
    attributes:
      label: Expected impact
      options:
        - label: Changes audio behavior
        - label: Changes serialized preset or pattern data
        - label: Changes browser storage
        - label: Changes factory presets
        - label: Changes legacy SynthX compatibility
        - label: Increases CPU or memory use
        - label: Adds a dependency
        - label: Requires major UI space
        - label: None of the above

  - type: textarea
    id: risks
    attributes:
      label: Risks and regression areas
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: Mockup, example or reference
      description: Add a sketch or example only when it clarifies the proposal.
    validations:
      required: false

  - type: dropdown
    id: testing
    attributes:
      label: Willingness to test
      options:
        - I can test a prototype and report results
        - I can help document the feature
        - I can contribute code
        - I am proposing only
    validations:
      required: true
